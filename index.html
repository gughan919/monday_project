<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monday Agent</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: rgba(15, 23, 42, 0.96);
      --text: #f8fafc;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --accent-strong: #60a5fa;
      --shadow: 0 25px 60px rgba(15, 23, 42, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top left, rgba(56, 189, 248, 0.18), transparent 35%),
                  radial-gradient(circle at bottom right, rgba(192, 132, 252, 0.2), transparent 28%),
                  linear-gradient(180deg, #020617 0%, #0f172a 100%);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .container {
      width: min(680px, 100%);
      background: var(--card);
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 28px;
      padding: 32px;
      box-shadow: var(--shadow);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 3vw, 2.75rem);
      letter-spacing: -0.04em;
    }

    p.subtitle {
      margin: 0 0 28px;
      color: var(--muted);
      line-height: 1.75;
      font-size: 1rem;
    }

    .card {
      display: grid;
      gap: 16px;
      padding: 24px;
      border-radius: 24px;
      background: rgba(15, 23, 42, 0.85);
      border: 1px solid rgba(148, 163, 184, 0.12);
    }

    label {
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-size: 0.95rem;
      color: var(--muted);
    }

    input[type="text"] {
      width: 100%;
      padding: 16px 18px;
      border-radius: 16px;
      border: 1px solid rgba(148, 163, 184, 0.15);
      background: rgba(15, 23, 42, 0.9);
      color: var(--text);
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s ease, transform 0.2s ease;
    }

    input[type="text"]:focus {
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
    }

    button {
      border: none;
      cursor: pointer;
      border-radius: 16px;
      padding: 14px 22px;
      background: linear-gradient(135deg, #38bdf8, #60a5fa);
      color: #0f172a;
      font-weight: 700;
      font-size: 1rem;
      transition: transform 0.2s ease, filter 0.2s ease;
      box-shadow: 0 18px 30px rgba(56, 189, 248, 0.18);
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
    }

    #res {
      min-height: 120px;
      margin: 0;
      white-space: pre-wrap;
      line-height: 1.75;
      border-radius: 18px;
      padding: 20px;
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid rgba(148, 163, 184, 0.12);
      color: #e2e8f0;
    }

    .note {
      display: block;
      margin-top: 12px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .footer {
      margin-top: 24px;
      text-align: center;
      color: #94a3b8;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Monday Agent</h1>
      <p class="subtitle">Ask your business question and get smart, fast answers from your agent.</p>
    </header>

    <div class="card">
      <label for="q">
        Question
        <input id="q" type="text" placeholder="e.g. What should I focus on this week?" />
      </label>

      <div class="actions">
        <button onclick="ask()">Ask the agent</button>
        <span class="note">Tip: keep it clear and specific for best results.</span>
      </div>

      <div id="res">Your answer will appear here.</div>
    </div>

    <div class="footer">Connected to <strong>http://localhost:3000/ask</strong></div>
  </div>

  <script>
    async function ask() {
      const q = document.getElementById("q").value.trim();
      if (!q) {
        document.getElementById("res").innerText = "Please type a question before asking.";
        return;
      }

      document.getElementById("res").innerText = "Thinking...";

      try {
        const res = await fetch("http://localhost:3000/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question: q })
        });

        const data = await res.json();
        document.getElementById("res").innerText = data.answer || "No answer received.";
      } catch (error) {
        document.getElementById("res").innerText = "Unable to reach the server. Please make sure it is running.";
        console.error(error);
      }
    }
  </script>
</body>
</html>
